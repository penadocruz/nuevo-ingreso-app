<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Banco Promerica – Iniciar sesión</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:   #005A2B;
      --green-mid:    #007A3D;
      --green-light:  #2E9E55;
      --link-blue:    #1A56A0;
      --text-primary: #1A1A1A;
      --text-muted:   #6B7280;
      --border:       #D1D5DB;
      --bg-card:      #FFFFFF;
      --radius-card:  24px;
      --radius-input: 10px;
      --radius-btn:   50px;
      --font:         'Segoe UI', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: #F3F4F6;
    }

    /* ── Layout ── */
    .screen {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      background: #fff;
    }

    /* ── Header / Hero ── */
    .hero {
      background: var(--green-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 56px;
      gap: 16px;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Logo placeholder — reemplaza src con la ruta real del logo */
    .logo-img {
      height: 52px;
      width: auto;
    }

    /* Fallback SVG inline si no hay imagen */
    .logo-fallback {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-text {
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .logo-star {
      width: 44px;
      height: 44px;
    }

    .hero-subtitle {
      color: rgba(255,255,255,0.92);
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0.1px;
    }

    /* ── Card ── */
    .card {
      background: var(--bg-card);
      border-radius: var(--radius-card) var(--radius-card) 0 0;
      margin-top: -20px;
      flex: 1;
      padding: 32px 24px 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Register link ── */
    .register-row {
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
    }

    .register-row a {
      color: var(--link-blue);
      font-weight: 600;
      text-decoration: underline;
      cursor: pointer;
    }

    /* ── Form fields ── */
    .fields {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap input {
      width: 100%;
      height: 52px;
      padding: 0 48px 0 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-input);
      font-size: 15px;
      color: var(--text-primary);
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-wrap input:focus {
      border-color: var(--green-mid);
      box-shadow: 0 0 0 3px rgba(0, 122, 61, 0.12);
    }

    .input-wrap input::placeholder { color: #B0B7C3; }

    .toggle-vis {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      color: var(--green-mid);
    }

    .toggle-vis svg { width: 22px; height: 22px; }

    /* ── Forgot link ── */
    .forgot {
      text-align: center;
    }

    .forgot a {
      font-size: 14px;
      font-weight: 600;
      color: var(--link-blue);
      text-decoration: none;
      cursor: pointer;
    }

    .forgot a:hover { text-decoration: underline; }

    /* ── CTA button ── */
    .btn-login {
      width: 100%;
      height: 56px;
      background: var(--green-dark);
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-login:hover  { background: var(--green-mid); }
    .btn-login:active { transform: scale(0.98); }

    /* ── Error message ── */
    .error-msg {
      display: none;
      font-size: 13px;
      color: #DC2626;
      margin-top: 4px;
    }

    .field.has-error .input-wrap input {
      border-color: #DC2626;
    }

    .field.has-error .error-msg { display: block; }
  </style>
</head>
<body>

<div class="screen">

  <!-- Hero -->
  <div class="hero">
    <img src="logo.png" alt="Banco Promerica" class="logo-img" />
    <p class="hero-subtitle">¡Bienvenido de nuevo!</p>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- Registro -->
    <p class="register-row">
      ¿Primera vez que ingresas? <a href="#">Crear usuario</a>
    </p>

    <!-- Campos -->
    <div class="fields">

      <div class="field" id="field-user">
        <label for="username">Usuario</label>
        <div class="input-wrap">
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Abcde-1278"
            autocomplete="username"
            autocapitalize="none"
          />
          <button
            type="button"
            class="toggle-vis"
            aria-label="Mostrar usuario"
            data-target="username"
            data-mode="text"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="error-msg">Ingresa tu usuario</span>
      </div>

      <div class="field" id="field-pass">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            name="password"
            placeholder=""
            autocomplete="current-password"
          />
          <button
            type="button"
            class="toggle-vis"
            aria-label="Mostrar contraseña"
            data-target="password"
            data-mode="password"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="error-msg">Ingresa tu contraseña</span>
      </div>

    </div>

    <!-- Olvidé mis credenciales -->
    <div class="forgot">
      <a href="#">¿Olvidaste tu usuario o contraseña?</a>
    </div>

    <!-- CTA -->
    <button class="btn-login" id="btn-login">Ingresar</button>

  </div><!-- /card -->

</div><!-- /screen -->

<script>
  /* ── Toggle visibilidad ── */
  document.querySelectorAll('.toggle-vis').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';

      const icon = btn.querySelector('svg');
      if (showing) {
        // Ojo tachado
        icon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        // Ojo abierto
        icon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>`;
      }
    });
  });

  /* ── Validación básica al submit ── */
  document.getElementById('btn-login').addEventListener('click', () => {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    let valid = true;

    const fieldUser = document.getElementById('field-user');
    const fieldPass = document.getElementById('field-pass');

    fieldUser.classList.toggle('has-error', !username);
    fieldPass.classList.toggle('has-error', !password);

    if (!username || !password) return;

    window.location.href = 'otp-promerica.html';
  });
</script>

</body>
</html>
