<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Banco Promerica – Iniciar sesión</title>
  <script>

</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:   #005A2B;
      --green-mid:    #007A3D;
      --link-blue:    #1A56A0;
      --text-primary: #1A1A1A;
      --text-muted:   #6B7280;
      --border:       #D1D5DB;
      --font:         'Segoe UI', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font);
      background: #fff;
    }

    .screen {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      background: #fff;
      overflow: hidden;
    }

    /* ── Hero ── */
    .hero {
      background: var(--green-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px 44px;
      gap: 12px;
      flex-shrink: 0;
    }

    .logo-img {
      height: 52px;
      width: auto;
    }

    .hero-subtitle {
      color: rgba(255,255,255,0.92);
      font-size: 18px;
      font-weight: 400;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 24px 24px 0 0;
      margin-top: -20px;
      flex: 1;
      padding: 28px 24px 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow: hidden;
    }

    .register-row {
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
    }

    .register-row a {
      color: var(--link-blue);
      font-weight: 600;
      text-decoration: underline;
      cursor: pointer;
    }

    .fields {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap input {
      width: 100%;
      height: 52px;
      padding: 0 48px 0 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      color: var(--text-primary);
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-wrap input:focus {
      border-color: var(--green-mid);
      box-shadow: 0 0 0 3px rgba(0,122,61,0.12);
    }

    .toggle-vis {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      color: var(--green-mid);
    }

    .toggle-vis svg { width: 22px; height: 22px; }

    .forgot { text-align: center; }

    .forgot a {
      font-size: 14px;
      font-weight: 600;
      color: var(--link-blue);
      text-decoration: none;
      cursor: pointer;
    }

    .btn-login {
      width: 100%;
      height: 54px;
      background: var(--green-dark);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: auto;
    }

    .btn-login:hover  { background: var(--green-mid); }
    .btn-login:active { transform: scale(0.98); }

    .error-msg { display: none; font-size: 13px; color: #DC2626; margin-top: 2px; }
    .field.has-error .input-wrap input { border-color: #DC2626; }
    .field.has-error .error-msg { display: block; }
  </style>
</head>
<body>
<div class="screen">

  <div class="hero">
    <img src="logo.png" alt="Banco Promerica" class="logo-img" />
    <p class="hero-subtitle">¡Bienvenido de nuevo!</p>
  </div>

  <div class="card">
    <p class="register-row">¿Primera vez que ingresas? <a href="#">Crear usuario</a></p>

    <div class="fields">
      <div class="field" id="field-user">
        <label for="username">Usuario</label>
        <div class="input-wrap">
          <input type="text" id="username" placeholder="Abcde-1278"
                 autocomplete="username" autocapitalize="none" />
          <button type="button" class="toggle-vis" data-target="username" aria-label="Mostrar usuario">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="error-msg">Ingresa tu usuario</span>
      </div>

      <div class="field" id="field-pass">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <input type="password" id="password" autocomplete="current-password" />
          <button type="button" class="toggle-vis" data-target="password" aria-label="Mostrar contraseña">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="error-msg">Ingresa tu contraseña</span>
      </div>
    </div>

    <div class="forgot"><a href="#">¿Olvidaste tu usuario o contraseña?</a></div>

    <button class="btn-login" id="btn-login">Ingresar</button>
  </div>

</div>
<script>
  document.querySelectorAll('.toggle-vis').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      btn.querySelector('svg').innerHTML = showing
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
           <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
           <circle cx="12" cy="12" r="3"/>`;
    });
  });

  document.getElementById('btn-login').addEventListener('click', () => {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    document.getElementById('field-user').classList.toggle('has-error', !username);
    document.getElementById('field-pass').classList.toggle('has-error', !password);
    if (!username || !password) return;
    window.location.href = 'otp-promerica.html';
  });
</script>
</body>
</html>
