  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:   #005A2B;
      --green-mid:    #007A3D;
      --text-primary: #111827;
      --text-body:    #374151;
      --font:         'Segoe UI', system-ui, sans-serif;
    }

    html, body { height: 100%; overflow: hidden; font-family: var(--font); background: #fff; }

    .screen {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      background: #fff;
      padding: 0 24px 30vh;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 16px;
    }

    .check-wrap { width: 100%; display: flex; justify-content: center; margin-bottom: 8px; }

    .check-circle { width: 88px; height: 88px; }

    .check-circle .circle-path {
      stroke-dasharray: 283;
      stroke-dashoffset: 283;
      animation: draw-circle 0.5s ease forwards 0.1s;
    }

    .check-circle .check-path {
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: draw-check 0.35s ease forwards 0.55s;
    }

    @keyframes draw-circle { to { stroke-dashoffset: 0; } }
    @keyframes draw-check  { to { stroke-dashoffset: 0; } }

    .title {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.2;
      text-align: center;
      width: 100%;
    }

    .body-text { font-size: 15px; color: var(--text-body); line-height: 1.7; }
    .device-name { font-size: 15px; font-weight: 700; color: var(--text-primary); }

    .btn-enter {
      width: 100%;
      height: 54px;
      background: var(--green-dark);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .btn-enter:hover { background: var(--green-mid); }
    .btn-enter:active { transform: scale(0.98); }
  </style>
</head>
<body>
<div class="screen">

  <div class="content">
    <div class="check-wrap">
      <svg class="check-circle" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle class="circle-path" cx="48" cy="48" r="45"
                stroke="#005A2B" stroke-width="4" stroke-linecap="round"
                fill="none" transform="rotate(-90 48 48)"/>
        <polyline class="check-path" points="28,50 42,64 68,36"
                  stroke="#005A2B" stroke-width="5"
                  stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>

    <h1 class="title">Tu Súper App está lista para ti</h1>

    <p class="body-text">Al hacer gestiones desde tu computadora en Promerica en Línea, ten a mano tu dispositivo único autorizador:</p>

    <p class="device-name" id="device-name">iPhone 15 Pro</p>
  </div>

  <button class="btn-enter" id="btn-enter">Ingresar a Súper App</button>

</div>
<script>
  document.getElementById('btn-enter').addEventListener('click', () => {
    console.log('Flujo completo');
  });
</script>
</body>
</html>
