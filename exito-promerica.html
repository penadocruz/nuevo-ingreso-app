<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Banco Promerica – ¡Listo!</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:   #005A2B;
      --green-mid:    #007A3D;
      --text-primary: #111827;
      --text-body:    #374151;
      --font:         'Segoe UI', system-ui, sans-serif;
    }

    html, body { height: 100%; overflow: hidden; font-family: var(--font); background: #fff; }

    .screen {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      background: #fff;
      padding: 0 24px 30vh;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 16px;
    }

    .check-wrap { width: 100%; display: flex; justify-content: center; margin-bottom: 8px; }

    .check-circle { width: 88px; height: 88px; }

    .check-circle .circle-path {
      stroke-dasharray: 283;
      stroke-dashoffset: 283;
      animation: draw-circle 0.5s ease forwards 0.1s;
    }

    .check-circle .check-path {
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: draw-check 0.35s ease forwards 0.55s;
    }

    @keyframes draw-circle { to { stroke-dashoffset: 0; } }
    @keyframes draw-check  { to { stroke-dashoffset: 0; } }

    .title {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.2;
      text-align: center;
      width: 100%;
    }

    .body-text { font-size: 15px; color: var(--text-body); line-height: 1.7; }
    .device-name { font-size: 15px; font-weight: 700; color: var(--text-primary); }

    .btn-enter {
      width: 100%;
      height: 54px;
      background: var(--green-dark);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .btn-enter:hover { background: var(--green-mid); }
    .btn-enter:active { transform: scale(0.98); }

    /* ── System Dialog ── */
    .dialog-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      padding: 24px;
    }

    .dialog-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .dialog-box {
      background: rgba(242, 242, 247, 0.98);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 14px;
      width: 100%;
      max-width: 320px;
      overflow: hidden;
      transform: scale(0.85);
      transition: transform 0.3s cubic-bezier(0.34, 1.4, 0.64, 1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .dialog-overlay.show .dialog-box {
      transform: scale(1);
    }

    .dialog-body {
      padding: 20px 20px 16px;
      text-align: center;
      border-bottom: 1px solid rgba(60, 60, 67, 0.18);
    }

    .dialog-icon {
      width: 44px;
      height: 44px;
      background: #F0F7FF;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
    }

    .dialog-icon svg { width: 24px; height: 24px; color: #007AFF; }

    .dialog-title {
      font-size: 17px;
      font-weight: 700;
      color: #1C1C1E;
      margin-bottom: 6px;
    }

    .dialog-message {
      font-size: 13px;
      color: #3A3A3C;
      line-height: 1.5;
    }

    .dialog-actions {
      display: flex;
      flex-direction: column;
    }

    .dialog-btn {
      background: none;
      border: none;
      padding: 14px 20px;
      font-size: 17px;
      cursor: pointer;
      border-bottom: 1px solid rgba(60, 60, 67, 0.18);
      transition: background 0.15s;
      color: #007AFF;
      font-weight: 600;
    }

    .dialog-btn:last-child { border-bottom: none; }
    .dialog-btn:active { background: rgba(0,0,0,0.06); }
    .dialog-btn.secondary { font-weight: 400; color: #007AFF; }
  </style>
</head>
<body>
<!-- System Dialog -->
<div class="dialog-overlay" id="dialog-overlay">
  <div class="dialog-box">
    <div class="dialog-body">
      <div class="dialog-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/><line x1="12" y1="17" x2="12" y2="10"/>
        </svg>
      </div>
      <div class="dialog-title">Ya puedes cerrar esta pestaña</div>
      <div class="dialog-message">Tu Súper App está activada. Continuá tu sesión directamente desde la aplicación en tu celular.</div>
    </div>
    <div class="dialog-actions">
      <button class="dialog-btn" id="btn-close-tab">Cerrar pestaña</button>
      <button class="dialog-btn secondary" id="btn-dismiss">Entendido</button>
    </div>
  </div>
</div>

<div class="screen">

  <div class="content">
    <div class="check-wrap">
      <svg class="check-circle" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle class="circle-path" cx="48" cy="48" r="45"
                stroke="#005A2B" stroke-width="4" stroke-linecap="round"
                fill="none" transform="rotate(-90 48 48)"/>
        <polyline class="check-path" points="28,50 42,64 68,36"
                  stroke="#005A2B" stroke-width="5"
                  stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>

    <h1 class="title">Tu Súper App está lista para ti</h1>

    <p class="body-text">Al hacer gestiones desde tu computadora en Promerica en Línea, ten a mano tu dispositivo único autorizador:</p>

    <p class="device-name" id="device-name">iPhone 15 Pro</p>
  </div>

  <button class="btn-enter" id="btn-enter">Ingresar a Súper App</button>

</div>
<script>
  const overlay = document.getElementById('dialog-overlay');

  document.getElementById('btn-enter').addEventListener('click', () => {
    overlay.classList.add('show');
  });

  document.getElementById('btn-close-tab').addEventListener('click', () => {
    window.close();
    // Fallback: si el navegador no permite cerrar, mostrar instrucción
    setTimeout(() => {
      document.querySelector('.dialog-message').textContent = 'Para cerrar, usá el botón ✕ de tu navegador o deslizá la pestaña hacia arriba.';
      document.getElementById('btn-close-tab').style.display = 'none';
    }, 400);
  });

  document.getElementById('btn-dismiss').addEventListener('click', () => {
    overlay.classList.remove('show');
  });
</script>
</body>
</html>
